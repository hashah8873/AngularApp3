<h2>Book List</h2>

<div *ngFor="let book of books">

  <h3>{{ book.title }}</h3>

  <p><strong>Author:</strong> {{ book.author }}</p>

  <p>{{ book.description }}</p>

  <button (click)="deleteBook(book.id)">Delete</button>
  <button (click)="goToUpdate(book)">Update</button>

  <hr>

</div>

<p *ngIf="books.length === 0">
  No books found.
</p>
