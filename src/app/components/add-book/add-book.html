<h2>Add Book</h2>

<form (ngSubmit)="addBook()">

  <label>Title</label><br>
  <input
    type="text"
    name="title"
    [(ngModel)]="title"
    required
  >
  <br><br>

  <label>Author</label><br>
  <input
    type="text"
    name="author"
    [(ngModel)]="author"
    required
  >
  <br><br>

  <label>Description</label><br>
  <textarea
    name="description"
    [(ngModel)]="description"
  ></textarea>
  <br><br>

  <button type="submit">
    Add Book
  </button>

</form>
